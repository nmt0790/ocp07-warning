const FB_URL = "https://suco-07-default-rtdb.asia-southeast1.firebasedatabase.app";
const FB_NODE = "/suvus";

async function cloudLoad() {
  try {
    const r = await fetch(FB_URL + FB_NODE + ".json");
    const d = await r.json();
    if (!d) return [];
    return Object.values(d).filter(Boolean).map(sv => {
      // Normalize field names từ tx-form cũ
      if (!sv.buocHienTai && sv.buocHT) sv.buocHienTai = sv.buocHT;
      if (!sv.ghiChu && sv.logs) sv.ghiChu = sv.logs;
      if (!sv.ghiChu && sv.nhatKy) sv.ghiChu = sv.nhatKy;
      return sv;
    });
  } catch(e) {
    console.warn("Firebase load failed:", e);
    return null;
  }
}

async function cloudSave(sv) {
  try {
    await fetch(FB_URL + FB_NODE + "/" + sv.id + ".json", {
      method: "PUT",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(sv)
    });
  } catch(e) { console.warn("Firebase save failed:", e); }
}

async function cloudDelete(id) {
  try {
    await fetch(FB_URL + FB_NODE + "/" + id + ".json", {
      method: "DELETE"
    });
  } catch(e) { console.warn("Firebase delete failed:", e); }
}

async function cloudBatch(list) {
  try {
    const obj = {};
    list.forEach(sv => { obj[sv.id] = sv; });
    await fetch(FB_URL + FB_NODE + ".json", {
      method: "PATCH",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(obj)
    });
  } catch(e) { console.warn("Firebase batch failed:", e); }
}

  L.push(``);
  L.push(sep);
  return L.join("\n");
}


function genTuanText(data, tuNgay, denNgay) {
  const conNoSv = s => Math.max(0,(s.txTraTT||0)-((s.daThuTXNH||0)+(s.daThuTXLuong||0)+(s.daThuTXCoc||0)));
  const total = data.length;
  const dang = data.filter(s=>s.trangThai!=="hoan_thanh").length;
  const hoan = data.filter(s=>s.trangThai==="hoan_thanh").length;
  const tongSC = data.reduce((a,s)=>a+(s.tongTT||0),0);
  const bhTra = data.reduce((a,s)=>a+(s.bhTraTT||0),0);
  const conNo = data.reduce((a,s)=>a+conNoSv(s),0);
  const vctnList = data.filter(s=>s.loai==="VCTN");
  const xuongList = data.filter(s=>s.loai==="XE_XUONG"||s.xeVaoXuong);
  const namLau = data.filter(s=>s.trangThai!=="hoan_thanh"&&daysSince(s.ngayTao)>=7);
  const byLoai = Object.entries(LOAI_SU_VU).map(([k,v])=>({k,v,count:data.filter(s=>s.loai===k).length})).filter(x=>x.count>0);
  const byTo = TEAM.slice(1).map(m=>({m,count:data.filter(s=>s.to===m.to).length,cn:data.filter(s=>s.to===m.to).reduce((a,s)=>a+conNoSv(s),0)}));
  const sep = "━━━━━━━━━━━━━━━━━━━━━━";
  const d1=new Date(tuNgay),d2=new Date(denNgay);
  const weekNum=Math.ceil(d1.getDate()/7);
  const L=[];
  L.push(`📊 BÁO CÁO TUẦN ${weekNum} - OCP.DOIXE07`);
  L.push(`🗓 ${fmtDate(tuNgay)} → ${fmtDate(denNgay)}`);
  L.push(sep);
  L.push(`📋 TỔNG QUAN`);
  L.push(`• Tổng sự vụ: ${total} | Đang XL: ${dang} | Hoàn thành: ${hoan}`);
  if(total>0) L.push(`• Tỷ lệ HT: ${Math.round(hoan/total*100)}%`);
  L.push(`• Chi phí SC: ${fmtK(tongSC)} | BH đã trả: ${fmtK(bhTra)}`);
  if(conNo>0) L.push(`• 💸 TX còn nợ: ${fmtK(conNo)}`);
  L.push(``);
  if(byLoai.length>0){
    L.push(`📂 THEO LOẠI`);
    byLoai.forEach(x=>L.push(`${x.v.icon} ${x.v.label}: ${x.count} vụ`));
    L.push(``);
  }
  if(namLau.length>0||xuongList.length>0){
    L.push(`⚠️ CẦN CHÚ Ý`);
    if(namLau.length>0){
      L.push(`🔴 Nằm lâu >7 ngày: ${namLau.length} sự vụ`);
      namLau.forEach(s=>L.push(`   • ${s.bienSo||s.taiXe} · ${daysSince(s.ngayTao)}ng · ${(getBuoc(s.loai).find(b=>b.id===s.buocHienTai)||{}).label||"—"}`));
    }
    if(xuongList.length>0){
      L.push(`🔨 Đang tại xưởng: ${xuongList.length} xe`);
      xuongList.forEach(s=>L.push(`   • ${s.bienSo||s.taiXe} · ${s.tenXuong||s.xuong||"—"} · ${daysSince(s.ngayTao)}ng`));
    }
    L.push(``);
  }
  if(vctnList.length>0){
    L.push(`💥 VCTN CHI TIẾT (${vctnList.length} vụ)`);
    vctnList.forEach((s,i)=>{
      const bl=(getBuoc("VCTN").find(b=>b.id===s.buocHienTai)||{}).label||"—";
      const cn=conNoSv(s);
      L.push(`${i+1}. ${s.bienSo||"—"} · ${s.taiXe||s.tenTX||"—"}`);
      L.push(`   📅 ${fmtDate(s.ngayTao)}${s.thoiGian?" "+s.thoiGian:""} | ${s.nhomLoi||""} | ${bl}`);
      if(s.diaDiem||s.viTri) L.push(`   📍 ${s.diaDiem||s.viTri}`);
      if(s.tongTT||s.bhTraTT||cn>0) L.push(`   💰 SC:${fmtK(s.tongTT||0)} BH:${fmtK(s.bhTraTT||0)}${cn>0?" Nợ:"+fmtK(cn):""}`);
      if(s.xuong||s.tenXuong) L.push(`   🔧 ${(s.xuong||s.tenXuong||"").replace("VinFast ","")}`);
    });
    L.push(``);
  }
  L.push(`👥 THEO TỔ`);
  byTo.filter(x=>x.count>0).forEach(x=>{
    L.push(`• ${x.m.ten} (${x.m.chuc}): ${x.count} vụ${x.cn>0?" | 💸 Nợ: "+fmtK(x.cn):" ✅"}`);
  });
  L.push(``);
  L.push(sep);
  L.push(`📍 OCP.DOIXE07 · Depot Hà Nội 1`);
  L.push(`📲 doixeocp07.cloud`);
  return L.join("\n");
}

  const vctnKQ=vctnList.filter(s=>s.nhomLoi==="Khách quan").length;
  const xuongList=data.filter(s=>s.loai==="XE_XUONG");
  const byLoai=Object.entries(LOAI_SU_VU).map(([k,v])=>({k,v,count:data.filter(s=>s.loai===k).length})).filter(x=>x.count>0);
  const byTo=TEAM.slice(1).map(m=>({m,count:data.filter(s=>s.to===m.to).length,vctn:data.filter(s=>s.to===m.to&&s.loai==="VCTN").length,cn:data.filter(s=>s.to===m.to).reduce((a,s)=>a+conNoSv(s),0)}));

  const L=[];

  L.push(`📋 TỔNG KẾT`);
  L.push(`• Tổng sự vụ: ${total}`);
  L.push(`• Hoàn thành: ${hoan}/${total} (${total>0?Math.round(hoan/total*100):0}%) | Còn XL: ${dang}`);
  L.push(`• Chi phí SC: ${fmtK(tongSC)}`);
  L.push(`• BH đã trả: ${fmtK(bhTra)}`);
  L.push(`• TX còn nợ: ${fmtK(conNo)}`);
  L.push(``);
  if(byLoai.length>0){
    L.push(`📂 PHÂN LOẠI SỰ VỤ`);
    byLoai.forEach(x=>L.push(`${x.v.icon} ${x.v.label}: ${x.count} vụ`));
    L.push(``);
  }
  if(vctnList.length>0){
    L.push(`💥 PHÂN TÍCH VCTN (${vctnList.length} vụ)`);
    L.push(`• Chủ quan: ${vctnCQ} | Khách quan: ${vctnKQ} | Khác: ${vctnList.length-vctnCQ-vctnKQ}`);
    if(tongSC>0) L.push(`• Tổng thiệt hại: ${fmtK(tongSC)} | BH bù: ${fmtK(bhTra)} | TX chịu: ${fmtK(tongSC-bhTra)}`);
    L.push(``);
  }
  if(xuongList.length>0){
    L.push(`🔨 XE VÀO XƯỞNG (${xuongList.length} lần)`);
    const xuongCount={};
    xuongList.forEach(s=>{const x=s.tenXuong||s.xuong||"Khác";xuongCount[x]=(xuongCount[x]||0)+1;});
    Object.entries(xuongCount).forEach(([x,c])=>L.push(`• ${x.replace("VinFast ","")}: ${c} xe`));
    L.push(``);
  }
  L.push(`👥 HIỆU SUẤT THEO TỔ`);
  byTo.forEach(x=>{
    const rate=x.count>0?Math.round(data.filter(s=>s.to===x.m.to&&s.trangThai==="hoan_thanh").length/x.count*100):100;
    L.push(`• ${x.m.ten} (${x.m.chuc}): ${x.count} vụ | VCTN: ${x.vctn} | HT: ${rate}%${x.cn>0?" | 💸 "+fmtK(x.cn):""}`);
  });
  L.push(``);
  if(chuaXong.length>0){
    L.push(`⏳ CHƯA HOÀN THÀNH (${chuaXong.length} vụ)`);
    chuaXong.slice(0,5).forEach(s=>{
      const bl=(getBuoc(s.loai).find(b=>b.id===s.buocHienTai)||{}).label||"—";

    });
    if(chuaXong.length>5)L.push(`  ... và ${chuaXong.length-5} sự vụ khác`);
    L.push(``);
  }
  L.push(sep);
  L.push(`📍 OCP.DOIXE07 · Depot Hà Nội 1`);
  L.push(`📲 doixeocp07.cloud`);
  return L.join("\n");
}

const FB_BHVC_URL = "https://suco-07-default-rtdb.asia-southeast1.firebasedatabase.app/bhvc";
let _bhvcCache = null;
async function bhvcFetch() {
  if (_bhvcCache) return _bhvcCache;
  try {
    const r = await fetch(FB_BHVC_URL + '.json');
    _bhvcCache = await r.json() || {};
  } catch { _bhvcCache = {}; }
  return _bhvcCache;
}

function BHTVSearch() {
  const [q, setQ] = useState("");
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [searched, setSearched] = useState(false);
  const [expanded, setExpanded] = useState(null);
  const [sortBy, setSortBy] = useState("hhBHVC");
  const [filterHH, setFilterHH] = useState("ALL");
  const [copied, setCopied] = useState(false);

  const norm = s => (s||'').replace(/[.\-\s]/g,'').toUpperCase();

  const daysDiff = dateStr => {
    if (!dateStr) return null;
    let d;
    if (dateStr.includes('/')) {
      const [dd,mm,yyyy] = dateStr.split('/');
      d = new Date(`${yyyy}-${mm}-${dd}`);
    } else {
      d = new Date(dateStr);
    }
    if (isNaN(d)) return null;
    return Math.floor((d - new Date()) / 86400000);
  };

  const bhStatus = dateStr => {
    const diff = daysDiff(dateStr);
    if (diff === null) return {label:"Chưa có dữ liệu", color:"#475569", dot:"⚫"};
    if (diff < 0)   return {label:`Đã HẾT HẠN ${Math.abs(diff)} ngày`, color:C.red, dot:"🔴"};
    if (diff <= 30) return {label:`Còn ${diff} ngày ⚠️`, color:"#f59e0b", dot:"🟡"};
    return {label:`Còn ${diff} ngày`, color:"#22c55e", dot:"🟢"};
  };

  const runSearch = async (filt=filterHH, qv=q) => {
    setLoading(true); setSearched(true); setExpanded(null);
    // Load /bhvc (chính) + /vehicles (tham chiếu tổ/tài xế)
    const [bhvcDb, vehDb] = await Promise.all([bhvcFetch(), vehFetch()]);
    const vehArr = Object.values(vehDb||{});

    // Ghép: BH data từ /bhvc + tổ/TX từ /vehicles
    const all = Object.values(bhvcDb||{}).filter(Boolean).map(b => {
      const bsn = norm(b.bks||'');
      const veh = vehArr.find(v => norm(v.bienSo||'') === bsn) || {};
      return {
        bienSo: b.bks || b.bienSo || '',
        loaiXe: b.xe || veh.loaiXe || '',
        bhDV: b.bh || '',
        phamViBH: b.pv || '',
        ngayKyBHVC: b.tu || '',
        ngayHetHanBHVC: b.den || '',  // YYYY-MM-DD từ /bhvc
        sdtBH: b.sdt || '',
        soKhung: b.vin || veh.soKhung || '',
        to: veh.to || '',
        tenTX: veh.tenTX || veh.taiXe || '',
        ngayHetHanBHTNDS: veh.ngayHetHanBHTNDS || '',
        hanDangKiem: veh.hanDangKiem || '',
      };
    });

    let res = !qv.trim() ? all : all.filter(v => {
      const qn = norm(qv);
      return norm(v.bienSo).includes(qn)||norm(v.tenTX||'').includes(qn)||
             norm(v.to||'').includes(qn)||norm(v.bhDV||'').includes(qn);
    });
    if (filt !== "ALL") res = res.filter(v => {
      const diff = daysDiff(v.ngayHetHanBHVC);
      if (filt==="het") return diff!==null&&diff<0;
      if (filt==="sap") return diff!==null&&diff>=0&&diff<=30;
      if (filt==="con") return diff!==null&&diff>30;
      return true;
    });
    res = [...res].sort((a,b) => {
      if (sortBy==="bienSo") return norm(a.bienSo).localeCompare(norm(b.bienSo));
      if (sortBy==="to")     return norm(a.to||'').localeCompare(norm(b.to||''));
      const da=daysDiff(a.ngayHetHanBHVC); const db2=daysDiff(b.ngayHetHanBHVC);
      return (da??99999)-(db2??99999);
    });
    setResults(res); setLoading(false);
  };

  const quickFilter = filt => { setFilterHH(filt); setQ(""); runSearch(filt,""); };

  const stats = (() => {
    const het = results.filter(v=>{const d=daysDiff(v.ngayHetHanBHVC);return d!==null&&d<0;});
    const sap = results.filter(v=>{const d=daysDiff(v.ngayHetHanBHVC);return d!==null&&d>=0&&d<=30;});
    const ok  = results.filter(v=>{const d=daysDiff(v.ngayHetHanBHVC);return d!==null&&d>30;});
    return {total:results.length,het:het.length,sap:sap.length,ok:ok.length};
  })();

  const copyReport = () => {
    const het = results.filter(v=>{const d=daysDiff(v.ngayHetHanBHVC);return d!==null&&d<0;});
    const sap = results.filter(v=>{const d=daysDiff(v.ngayHetHanBHVC);return d!==null&&d>=0&&d<=30;});
    const L=[];
    L.push(`🛡️ BÁO CÁO BHVC – OCP.DOIXE07`);
    L.push(`📅 Ngày: ${fmtDate(today())}`);
    L.push(`━━━━━━━━━━━━━━━━━━━━━━`);
    L.push(`📊 TỔNG HỢP (${results.length} xe)`);
    L.push(`🔴 Đã hết hạn: ${het.length} xe`);
    L.push(`🟡 Sắp hết (≤30 ngày): ${sap.length} xe`);

// ── AUTOCOMPLETE BIỂN SỐ – VEHICLE LOOKUP ────────────────────────────────────
const FB_VEH_URL = "https://suco-07-default-rtdb.asia-southeast1.firebasedatabase.app/vehicles";
let _vehCache = null;

async function vehFetch() {
  if (_vehCache) return _vehCache;
  try {
    const r = await fetch(FB_VEH_URL + '.json');
    _vehCache = await r.json() || {};
  } catch { _vehCache = {}; }
  return _vehCache;
}

function vehNorm(s) { return (s||'').replace(/[.\-\s]/g,'').toUpperCase(); }

window.vehSearch = async function(val, onSelect) {
  if (!val || val.length < 3) return [];
  const db = await vehFetch();
  const q = vehNorm(val);
  return Object.values(db).filter(v => vehNorm(v.bienSo||'').includes(q)).slice(0,6);
};

window.vehFillForm = function(v, setF) {
  if (!v || !setF) return;
  const toMap = {
    'Tổ 01':'OCP.DOIXE07.01','Tổ 02':'OCP.DOIXE07.02',
    'Tổ 03':'OCP.DOIXE07.03','Tổ 04':'OCP.DOIXE07.04','Tổ 05':'OCP.DOIXE07.05'
  };
  const loaiMap = {
    'MINIOGREEN':'VF5','LIMOGREEN':'VF8','VFE34':'VFE34',
    'VF5':'VF5','HERIOGREEN':'VF5','MINIOGREENPLUS':'VF5'
  };
  setF(prev => ({
    ...prev,
    bienSo:   v.bienSo  || prev.bienSo,
    loaiXe:   loaiMap[v.loaiXe] || v.loaiXe || prev.loaiXe,
    soKhung:  v.soKhung || prev.soKhung,
    to:       toMap[v.to] || prev.to,
    taiXe:    v.tenTX   || prev.taiXe,
    // BH tự điền
    bhDV:         v.bhDV         || prev.bhDV,
    phamViBH:     v.phamViBH     || prev.phamViBH,
    ngayKyBHVC:   v.ngayKyBHVC   || prev.ngayKyBHVC,
    ngayHetBHVC:  v.ngayHetHanBHVC  || prev.ngayHetBHVC,
    ngayKyBHTNDS: v.ngayKyBHTNDS || prev.ngayKyBHTNDS,
    ngayHetBHTNDS:v.ngayHetHanBHTNDS|| prev.ngayHetBHTNDS,
    hanDangKiem:  v.hanDangKiem  || '',

};

  const timer = React.useRef(null);

  React.useEffect(() => {
    clearTimeout(timer.current);
    if (!bienSo || bienSo.length < 3) { setSuggestions([]); setShow(false); return; }
    timer.current = setTimeout(async () => {
      const res = await window.vehSearch(bienSo);
      setSuggestions(res);
      setShow(res.length > 0);
    }, 300);
    return () => clearTimeout(timer.current);
  }, [bienSo]);

  const select = (v) => { window.vehFillForm(v, setF); setShow(false); setSuggestions([]); };
  const hide   = ()  => setTimeout(() => setShow(false), 200);
  return { suggestions, show, select, hide };
};


// ── VEHICLE AUTOCOMPLETE (Global JS, không dụng vào React) ──────────────────
(function() {
  const FB_VEH = "https://suco-07-default-rtdb.asia-southeast1.firebasedatabase.app/vehicles";
  let _cache = null, _timer = null, _activeInput = null;

  // CSS cho dropdown
  const style = document.createElement('style');
  style.textContent = `
    #_veh_dd {
      position:fixed; z-index:9999; background:#fff;
      border:2px solid #2DCCD3; border-radius:12px;
      box-shadow:0 6px 24px rgba(45,204,211,.25);
      max-height:260px; overflow-y:auto; min-width:280px;
      font-family:Nunito,sans-serif;
    }
    #_veh_dd .vdd-item {
      padding:10px 14px; cursor:pointer;
      border-bottom:1px solid #D5F5F6;
      transition:background .1s;
    }
    #_veh_dd .vdd-item:hover { background:#D5F5F6; }
    #_veh_dd .vdd-item:last-child { border-bottom:none; }
    #_veh_dd .vdd-bs { font-size:14px; font-weight:800; color:#0B3335; }
    #_veh_dd .vdd-info { font-size:11px; color:#17666A; margin-top:2px; }
    #_veh_dd .vdd-bh { font-size:10px; color:#FFCA00; }
  `;
  document.head.appendChild(style);

  async function getVehicles() {
    if (_cache) return _cache;
    try {
      const r = await fetch(FB_VEH + '.json');
      _cache = await r.json() || {};
    } catch(e) { _cache = {}; }
    return _cache;
  }

  function norm(s) { return (s||'').replace(/[.\-\s]/g,'').toUpperCase(); }

  function showDD(items, input) {
    removeDD();
    if (!items.length) return;
    const dd = document.createElement('div');
    dd.id = '_veh_dd';

    const rect = input.getBoundingClientRect();
    dd.style.cssText = `top:${rect.bottom+4}px;left:${rect.left}px;width:${Math.max(rect.width,280)}px`;

    items.forEach(v => {
      const item = document.createElement('div');
      item.className = 'vdd-item';
      const loaiMap = {MINIOGREEN:'VF5',LIMOGREEN:'VF8',VFE34:'VFE34',VF5:'VF5',HERIOGREEN:'VF5'};
      const loai = loaiMap[v.loaiXe] || v.loaiXe || '';
      item.innerHTML = `
        <div class="vdd-bs">${v.bienSo}</div>
        <div class="vdd-info">${loai} · ${v.to}${v.tenTX?' · '+v.tenTX:''}</div>
        ${v.bhDV?`<div class="vdd-bh">BH: ${v.bhDV} · HH BHVC: ${v.ngayHetHanBHVC||'—'}</div>`:''}
      `;
      item.addEventListener('mousedown', e => {
        e.preventDefault();
        fillVehicle(v, input);
        removeDD();
      });
      dd.appendChild(item);
    });
    document.body.appendChild(dd);
  }

  function removeDD() {
    document.getElementById('_veh_dd')?.remove();
  }

  const toFull = {
    'Tổ 01':'OCP.DOIXE07.01','Tổ 02':'OCP.DOIXE07.02','Tổ 03':'OCP.DOIXE07.03',
    'Tổ 04':'OCP.DOIXE07.04','Tổ 05':'OCP.DOIXE07.05'
  };

  function fillVehicle(v, bsInput) {
    // Điền biển số - trigger React qua nativeInputValueSetter
    const nativeSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value').set;
    const triggerChange = el => {
      nativeSetter.call(el, el.dataset.fill || '');
      el.dispatchEvent(new Event('input', {bubbles:true}));
      el.dispatchEvent(new Event('change', {bubbles:true}));
      setTimeout(() => el.dispatchEvent(new Event('blur', {bubbles:true})), 50);
    };

    // Tìm các fields trong form đang mở
    const form = document.querySelector('[style*="position:fixed"][style*="z-index:100"]') || document.body;
    const allInputs = form.querySelectorAll('input, select, textarea');

    const fill = (placeholder, value) => {
      allInputs.forEach(el => {
        const label = el.closest('div')?.previousElementSibling?.textContent?.toUpperCase() || '';
        const ph = (el.placeholder||'').toUpperCase();
        if (!value) return;
        // Match theo placeholder hoặc label
        if (placeholder === 'BIENSO' && (ph.includes('51F') || ph.includes('BIỂN'))) {
          el.dataset.fill = value; triggerChange(el);
        }
        if (placeholder === 'SOKHUNG' && (ph.includes('KHUNG') || label.includes('KHUNG'))) {
          el.dataset.fill = value; triggerChange(el);
        }
        if (placeholder === 'TAIXE' && (ph.includes('NGUYỄN') || label.includes('TÀI XẾ'))) {
          el.dataset.fill = value; triggerChange(el);
        }
      });
      // Fill select Tổ
      allInputs.forEach(el => {
        if (el.tagName === 'SELECT' && el.innerHTML.includes('OCP.DOIXE07')) {
          const fullTo = toFull[v.to] || v.to;
          if (fullTo) {
            el.dataset.fill = fullTo;
            nativeSetter.call(el, fullTo);
            el.dispatchEvent(new Event('change', {bubbles:true}));
          }
        }
      });
    };

    fill('BIENSO', v.bienSo);
    fill('SOKHUNG', v.soKhung);
    fill('TAIXE', v.tenTX);

    // Lưu BH info để form tự điền khi cần
    window._lastVehicle = v;
    bsInput.dataset.fill = v.bienSo;
    bsInput.dispatchEvent(new Event('blur', {bubbles:true}));
  }

  // Lắng nghe tất cả input events - tìm ô biển số
  document.addEventListener('input', async e => {
    const el = e.target;
    if (el.tagName !== 'INPUT') return;
    const ph = (el.placeholder||'').toUpperCase();
    const val = el.value || '';
    // Chỉ trigger khi đang gõ vào ô có placeholder liên quan đến biển số
    if (!ph.includes('51F') && !ph.includes('BIỂN') && !ph.includes('29E') && !ph.includes('29K')) {
      // Thử detect theo context: input nằm gần label "Biển số"
      const label = el.closest('div')?.previousElementSibling?.textContent || '';
      if (!label.toUpperCase().includes('BIỂN')) return;
    }

    _activeInput = el;
    clearTimeout(_timer);
    removeDD();
    if (val.length < 3) return;

    _timer = setTimeout(async () => {
      const db = await getVehicles();
      const q = norm(val);
      const matches = Object.values(db)
        .filter(v => norm(v.bienSo||'').includes(q))
        .slice(0, 6);
      showDD(matches, el);
    }, 300);
  }, true);

  document.addEventListener('blur', () => {
    setTimeout(removeDD, 200);
  }, true);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') removeDD();
  });

})();

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));


</script>
