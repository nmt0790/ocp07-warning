const FB_URL = "https://suco-07-default-rtdb.asia-southeast1.firebasedatabase.app";
const FB_NODE = "/suvus";

async function cloudLoad() {
  try {
    const r = await fetch(FB_URL + FB_NODE + ".json");
    const d = await r.json();
    if (!d) return [];
    // Firebase trả về object {id: record}, convert sang array
    return Object.values(d).filter(Boolean);
  } catch(e) {
    console.warn("Firebase load failed:", e);
    return null;
  }
}

async function cloudSave(sv) {
  try {
    await fetch(FB_URL + FB_NODE + "/" + sv.id + ".json", {
      method: "PUT",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(sv)
    });
  } catch(e) { console.warn("Firebase save failed:", e); }
}

async function cloudDelete(id) {
  try {
    await fetch(FB_URL + FB_NODE + "/" + id + ".json", {
      method: "DELETE"
    });
  } catch(e) { console.warn("Firebase delete failed:", e); }
}

async function cloudBatch(list) {
  try {
    const obj = {};
    list.forEach(sv => { obj[sv.id] = sv; });
    await fetch(FB_URL + FB_NODE + ".json", {
      method: "PATCH",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(obj)
    });
  } catch(e) { console.warn("Firebase batch failed:", e); }
}

const FB_BHVC_URL = "https://suco-07-default-rtdb.asia-southeast1.firebasedatabase.app/bhvc";
let _bhvcCache = null;

async function bhvcFetch() {
  if (_bhvcCache) return _bhvcCache;
  try {
    const r = await fetch(FB_BHVC_URL + ".json");
    if (!r.ok) throw new Error("HTTP " + r.status);
    _bhvcCache = await r.json() || {};
  } catch(e) {
    console.warn("bhvcFetch failed:", e);
    _bhvcCache = null;
    throw e;
  }
  return _bhvcCache;
}

// ── AUTOCOMPLETE BIỂN SỐ – VEHICLE LOOKUP ────────────────────────────────────
const FB_VEH_URL = "https://suco-07-default-rtdb.asia-southeast1.firebasedatabase.app/vehicles";
let _vehCache = null;

async function vehFetch() {
  if (_vehCache) return _vehCache;
  try {
    const r = await fetch(FB_VEH_URL + '.json');
    _vehCache = await r.json() || {};
  } catch { _vehCache = {}; }
  return _vehCache;
}

function vehNorm(s) { return (s||'').replace(/[.\-\s]/g,'').toUpperCase(); }

window.vehSearch = async function(val, onSelect) {
  if (!val || val.length < 3) return [];
  const db = await vehFetch();
  const q = vehNorm(val);
  return Object.values(db).filter(v => vehNorm(v.bienSo||'').includes(q)).slice(0,6);
};

window.vehFillForm = function(v, setF) {
  if (!v || !setF) return;
  const toMap = {
    'Tổ 01':'OCP.DOIXE07.01','Tổ 02':'OCP.DOIXE07.02',
    'Tổ 03':'OCP.DOIXE07.03','Tổ 04':'OCP.DOIXE07.04','Tổ 05':'OCP.DOIXE07.05'
  };
  const loaiMap = {
    'MINIOGREEN':'VF5','LIMOGREEN':'VF8','VFE34':'VFE34',
    'VF5':'VF5','HERIOGREEN':'VF5','MINIOGREENPLUS':'VF5'
  };
  setF(prev => ({
    ...prev,
    bienSo:   v.bienSo  || prev.bienSo,
    loaiXe:   loaiMap[v.loaiXe] || v.loaiXe || prev.loaiXe,
    soKhung:  v.soKhung || prev.soKhung,
    to:       toMap[v.to] || prev.to,
    taiXe:    v.tenTX   || prev.taiXe,
    // BH tự điền
    bhDV:         v.bhDV         || prev.bhDV,
    phamViBH:     v.phamViBH     || prev.phamViBH,
    ngayKyBHVC:   v.ngayKyBHVC   || prev.ngayKyBHVC,
    ngayHetBHVC:  v.ngayHetHanBHVC  || prev.ngayHetBHVC,
    ngayKyBHTNDS: v.ngayKyBHTNDS || prev.ngayKyBHTNDS,
    ngayHetBHTNDS:v.ngayHetHanBHTNDS|| prev.ngayHetBHTNDS,
    hanDangKiem:  v.hanDangKiem  || '',
    hanPhuHieu:   v.hanPhuHieu   || '',
    trangThaiXe:  v.trangThaiXe  || '',
  }));
};

// Hook React custom: dùng trong FormGSVH
window.useVehAutocomplete = function(bienSo, setF) {
  const [suggestions, setSuggestions] = React.useState([]);
  const [show, setShow] = React.useState(false);
  const timer = React.useRef(null);

  React.useEffect(() => {
    clearTimeout(timer.current);
    if (!bienSo || bienSo.length < 3) { setSuggestions([]); setShow(false); return; }
    timer.current = setTimeout(async () => {
      const res = await window.vehSearch(bienSo);
      setSuggestions(res);
      setShow(res.length > 0);
    }, 300);
    return () => clearTimeout(timer.current);
  }, [bienSo]);

  const select = (v) => { window.vehFillForm(v, setF); setShow(false); setSuggestions([]); };
  const hide   = ()  => setTimeout(() => setShow(false), 200);
  return { suggestions, show, select, hide };
};


// ── VEHICLE AUTOCOMPLETE (Global JS, không dụng vào React) ──────────────────
(function() {
  const FB_VEH = "https://suco-07-default-rtdb.asia-southeast1.firebasedatabase.app/vehicles";
  let _cache = null, _timer = null, _activeInput = null;

  // CSS cho dropdown
  const style = document.createElement('style');
  style.textContent = `
    #_veh_dd {
      position:fixed; z-index:9999; background:#fff;
      border:2px solid #2DCCD3; border-radius:12px;
      box-shadow:0 6px 24px rgba(45,204,211,.25);
      max-height:260px; overflow-y:auto; min-width:280px;
      font-family:Nunito,sans-serif;
    }
    #_veh_dd .vdd-item {
      padding:10px 14px; cursor:pointer;
      border-bottom:1px solid #D5F5F6;
      transition:background .1s;
    }
    #_veh_dd .vdd-item:hover { background:#D5F5F6; }
    #_veh_dd .vdd-item:last-child { border-bottom:none; }
    #_veh_dd .vdd-bs { font-size:14px; font-weight:800; color:#0B3335; }
    #_veh_dd .vdd-info { font-size:11px; color:#17666A; margin-top:2px; }
    #_veh_dd .vdd-bh { font-size:10px; color:#FFCA00; }
  `;
  document.head.appendChild(style);

  async function getVehicles() {
    if (_cache) return _cache;
    try {
      const r = await fetch(FB_VEH + '.json');
      _cache = await r.json() || {};
    } catch(e) { _cache = {}; }
    return _cache;
  }

  function norm(s) { return (s||'').replace(/[.\-\s]/g,'').toUpperCase(); }

  function showDD(items, input) {
    removeDD();
    if (!items.length) return;
    const dd = document.createElement('div');
    dd.id = '_veh_dd';

    const rect = input.getBoundingClientRect();
    dd.style.cssText = `top:${rect.bottom+4}px;left:${rect.left}px;width:${Math.max(rect.width,280)}px`;

    items.forEach(v => {
      const item = document.createElement('div');
      item.className = 'vdd-item';
      const loaiMap = {MINIOGREEN:'VF5',LIMOGREEN:'VF8',VFE34:'VFE34',VF5:'VF5',HERIOGREEN:'VF5'};
      const loai = loaiMap[v.loaiXe] || v.loaiXe || '';
      item.innerHTML = `
        <div class="vdd-bs">${v.bienSo}</div>
        <div class="vdd-info">${loai} · ${v.to}${v.tenTX?' · '+v.tenTX:''}</div>
        ${v.bhDV?`<div class="vdd-bh">BH: ${v.bhDV} · HH BHVC: ${v.ngayHetHanBHVC||'—'}</div>`:''}
      `;
      item.addEventListener('mousedown', e => {
        e.preventDefault();
        fillVehicle(v, input);
        removeDD();
      });
      dd.appendChild(item);
    });
    document.body.appendChild(dd);
  }

  function removeDD() {
    document.getElementById('_veh_dd')?.remove();
  }

  const toFull = {
    'Tổ 01':'OCP.DOIXE07.01','Tổ 02':'OCP.DOIXE07.02','Tổ 03':'OCP.DOIXE07.03',
    'Tổ 04':'OCP.DOIXE07.04','Tổ 05':'OCP.DOIXE07.05'
  };

  function fillVehicle(v, bsInput) {
    // Điền biển số - trigger React qua nativeInputValueSetter
    const nativeSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value').set;
    const triggerChange = el => {
      nativeSetter.call(el, el.dataset.fill || '');
      el.dispatchEvent(new Event('input', {bubbles:true}));
      el.dispatchEvent(new Event('change', {bubbles:true}));
      setTimeout(() => el.dispatchEvent(new Event('blur', {bubbles:true})), 50);
    };

    // Tìm các fields trong form đang mở
    const form = document.querySelector('[style*="position:fixed"][style*="z-index:100"]') || document.body;
    const allInputs = form.querySelectorAll('input, select, textarea');

    const fill = (placeholder, value) => {
      allInputs.forEach(el => {
        const label = el.closest('div')?.previousElementSibling?.textContent?.toUpperCase() || '';
        const ph = (el.placeholder||'').toUpperCase();
        if (!value) return;
        // Match theo placeholder hoặc label
        if (placeholder === 'BIENSO' && (ph.includes('51F') || ph.includes('BIỂN'))) {
          el.dataset.fill = value; triggerChange(el);
        }
        if (placeholder === 'SOKHUNG' && (ph.includes('KHUNG') || label.includes('KHUNG'))) {
          el.dataset.fill = value; triggerChange(el);
        }
        if (placeholder === 'TAIXE' && (ph.includes('NGUYỄN') || label.includes('TÀI XẾ'))) {
          el.dataset.fill = value; triggerChange(el);
        }
      });
      // Fill select Tổ
      allInputs.forEach(el => {
        if (el.tagName === 'SELECT' && el.innerHTML.includes('OCP.DOIXE07')) {
          const fullTo = toFull[v.to] || v.to;
          if (fullTo) {
            el.dataset.fill = fullTo;
            nativeSetter.call(el, fullTo);
            el.dispatchEvent(new Event('change', {bubbles:true}));
          }
        }
      });
    };

    fill('BIENSO', v.bienSo);
    fill('SOKHUNG', v.soKhung);
    fill('TAIXE', v.tenTX);

    // Lưu BH info để form tự điền khi cần
    window._lastVehicle = v;
    bsInput.dataset.fill = v.bienSo;
    bsInput.dispatchEvent(new Event('blur', {bubbles:true}));
  }

  // Lắng nghe tất cả input events - tìm ô biển số
  document.addEventListener('input', async e => {
    const el = e.target;
    if (el.tagName !== 'INPUT') return;
    const ph = (el.placeholder||'').toUpperCase();
    const val = el.value || '';
    // Chỉ trigger khi đang gõ vào ô có placeholder liên quan đến biển số
    if (!ph.includes('51F') && !ph.includes('BIỂN') && !ph.includes('29E') && !ph.includes('29K')) {
      // Thử detect theo context: input nằm gần label "Biển số"
      const label = el.closest('div')?.previousElementSibling?.textContent || '';
      if (!label.toUpperCase().includes('BIỂN')) return;
    }

    _activeInput = el;
    clearTimeout(_timer);
    removeDD();
    if (val.length < 3) return;

    _timer = setTimeout(async () => {
      const db = await getVehicles();
      const q = norm(val);
      const matches = Object.values(db)
        .filter(v => norm(v.bienSo||'').includes(q))
        .slice(0, 6);
      showDD(matches, el);
    }, 300);
  }, true);

  document.addEventListener('blur', () => {
    setTimeout(removeDD, 200);
  }, true);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') removeDD();
  });

})();
