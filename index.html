const FB_URL = "https://suco-07-default-rtdb.asia-southeast1.firebasedatabase.app";
const FB_NODE = "/suvus";

async function cloudLoad() {
  try {
    const r = await fetch(FB_URL + FB_NODE + ".json");
    const d = await r.json();
    if (!d) return [];
    // Firebase trả về object {id: record}, convert sang array
    return Object.values(d).filter(Boolean);
  } catch(e) {
    console.warn("Firebase load failed:", e);
    return null;
  }
}

async function cloudSave(sv) {
  try {
    await fetch(FB_URL + FB_NODE + "/" + sv.id + ".json", {
      method: "PUT",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(sv)
    });
  } catch(e) { console.warn("Firebase save failed:", e); }
}

async function cloudDelete(id) {
  try {
    await fetch(FB_URL + FB_NODE + "/" + id + ".json", {
      method: "DELETE"
    });
  } catch(e) { console.warn("Firebase delete failed:", e); }
}

async function cloudBatch(list) {
  try {
    const obj = {};
    list.forEach(sv => { obj[sv.id] = sv; });
    await fetch(FB_URL + FB_NODE + ".json", {
      method: "PATCH",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(obj)
    });
  } catch(e) { console.warn("Firebase batch failed:", e); }
}

// ── BHVC MODULE ───────────────────────────────────────────────────────────────
function BHVCModule() {
  const [q, setQ] = useState("");
  const [filterBH, setFilterBH] = useState("ALL");
  const [filterXe, setFilterXe] = useState("ALL");
  const [filterExp, setFilterExp] = useState("ALL");
  const [selItem, setSelItem] = useState(null);

  const today = new Date();
  today.setHours(0,0,0,0);

  function daysLeft(denStr) {
    if (!denStr) return null;
    const d = new Date(denStr);
    d.setHours(0,0,0,0);
    return Math.ceil((d - today) / 86400000);
  }

  function expLabel(days) {
    if (days === null) return { txt: "N/A", color: C.sub };
    if (days <= 0) return { txt: "Đã hết hạn", color: "#ef4444" };
    if (days <= 30) return { txt: days + " ngày", color: "#ef4444" };
    if (days <= 60) return { txt: days + " ngày", color: "#FFCA00" };
    return { txt: days + " ngày", color: "#4ade80" };
  }

  function fmtDate(s) {
    if (!s) return "";
    const d = new Date(s);
    return d.toLocaleDateString("vi-VN", {day:"2-digit",month:"2-digit",year:"numeric"});
  }

  const qNorm = q.trim().toUpperCase().replace(/[-. ]/g,"");
  
  const providers = ["ALL", ...Array.from(new Set(BHVC_DATA.map(r=>r.bh))).sort()];
  const xeTypes = ["ALL", ...Array.from(new Set(BHVC_DATA.map(r=>r.xe))).sort()];

  const filtered = BHVC_DATA.filter(r => {
    if (filterBH !== "ALL" && r.bh !== filterBH) return false;
    if (filterXe !== "ALL" && r.xe !== filterXe) return false;
    const days = daysLeft(r.den);
    if (filterExp === "urgent" && !(days !== null && days <= 30)) return false;
    if (filterExp === "soon" && !(days !== null && days > 30 && days <= 60)) return false;
    if (filterExp === "ok" && !(days !== null && days > 60)) return false;
    if (qNorm) {
      const bksNorm = (r.bks||"").replace(/[-. ]/g,"").toUpperCase();
      const vinNorm = (r.vin||"").toUpperCase();
      if (!bksNorm.includes(qNorm) && !vinNorm.includes(qNorm)) return false;
    }
    return true;
  });

  const stats = {
    total: BHVC_DATA.length,
    urgent: BHVC_DATA.filter(r => { const d=daysLeft(r.den); return d!==null && d<=30; }).length,
    soon: BHVC_DATA.filter(r => { const d=daysLeft(r.den); return d!==null && d>30 && d<=60; }).length,
    ok: BHVC_DATA.filter(r => { const d=daysLeft(r.den); return d!==null && d>60; }).length
  };

  const selDays = selItem ? daysLeft(selItem.den) : null;
  const selExp = selItem ? expLabel(selDays) : null;

  const selStyle = {
    position:"fixed", inset:0, background:"rgba(0,0,0,0.7)",
    display:"flex", alignItems:"flex-end", justifyContent:"center",
    zIndex:999, padding:"0 0 0 0"
  };

  const SE = (tag, props, ...children) => React.createElement(tag, props, ...children);

  return SE("div", {style:{display:"flex",flexDirection:"column",height:"100%"}},

    // Stats bar
    SE("div", {style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,padding:"10px 14px 0",flexShrink:0}},
      ...[
        {l:"Tổng xe",v:stats.total,c:C.accent,icon:"🛡️"},
        {l:"≤ 30 ngày",v:stats.urgent,c:"#ef4444",icon:"🚨"},
        {l:"31-60 ngày",v:stats.soon,c:"#FFCA00",icon:"⚠️"},
        {l:"> 60 ngày",v:stats.ok,c:"#4ade80",icon:"✅"}
      ].map(s => SE("div", {
        key:s.l,
        style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,
          padding:"8px 6px",textAlign:"center",cursor:"pointer"},
        onClick: () => {
          if(s.l==="≤ 30 ngày") setFilterExp(filterExp==="urgent"?"ALL":"urgent");
          else if(s.l==="31-60 ngày") setFilterExp(filterExp==="soon"?"ALL":"soon");
          else if(s.l==="> 60 ngày") setFilterExp(filterExp==="ok"?"ALL":"ok");
          else setFilterExp("ALL");
        }
      },
        SE("div",{style:{fontSize:14}}, s.icon),
        SE("div",{style:{fontSize:16,fontWeight:800,color:s.c,lineHeight:1.2}}, s.v),
        SE("div",{style:{fontSize:8,color:C.sub,marginTop:1}}, s.l)
      ))
    ),

    // Search + Filters
    SE("div", {style:{padding:"8px 14px 6px",flexShrink:0,display:"flex",flexDirection:"column",gap:6}},
      SE("div",{style:{position:"relative"}},
        SE("input",{
          value:q,
          onChange:e=>setQ(e.target.value),
          placeholder:"🔍 Biển số hoặc số khung...",
          style:{width:"100%",background:"#0B3335",border:`1px solid ${C.border}`,
            borderRadius:10,padding:"9px 36px 9px 12px",color:C.text,
            fontSize:13,fontFamily:"inherit"}
        }),
        q && SE("button",{
          onClick:()=>setQ(""),
          style:{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",
            background:"none",border:"none",color:C.sub,cursor:"pointer",fontSize:16}
        },"×")
      ),
      SE("div",{style:{display:"flex",gap:6,overflowX:"auto"}},
        SE("select",{
          value:filterExp,
          onChange:e=>setFilterExp(e.target.value),
          style:{background:"#0B3335",border:`1px solid ${C.border}`,borderRadius:8,
            padding:"5px 8px",color:C.text,fontSize:11,fontFamily:"inherit",flexShrink:0}
        },
          SE("option",{value:"ALL"},"⏳ Tất cả hạn"),
          SE("option",{value:"urgent"},"🚨 ≤ 30 ngày"),
          SE("option",{value:"soon"},"⚠️ 31-60 ngày"),
          SE("option",{value:"ok"},"✅ > 60 ngày")
        ),
        SE("select",{
          value:filterBH,
          onChange:e=>setFilterBH(e.target.value),
          style:{background:"#0B3335",border:`1px solid ${C.border}`,borderRadius:8,
            padding:"5px 8px",color:C.text,fontSize:11,fontFamily:"inherit",flexShrink:0}
        },
          SE("option",{value:"ALL"},"🏢 Tất cả BH"),
          ...providers.filter(p=>p!=="ALL").map(p=>SE("option",{key:p,value:p},p))
        ),
        SE("select",{
          value:filterXe,
          onChange:e=>setFilterXe(e.target.value),
          style:{background:"#0B3335",border:`1px solid ${C.border}`,borderRadius:8,
            padding:"5px 8px",color:C.text,fontSize:11,fontFamily:"inherit",flexShrink:0}
        },
          SE("option",{value:"ALL"},"🚗 Tất cả xe"),
          ...xeTypes.filter(x=>x!=="ALL").map(x=>SE("option",{key:x,value:x},x))
        )
      ),
      SE("div",{style:{fontSize:11,color:C.sub}}, `${filtered.length} xe`)
    ),

    // List
    SE("div", {style:{flex:1,overflowY:"auto",padding:"0 14px 14px"}},
      filtered.length === 0
        ? SE("div",{style:{textAlign:"center",color:C.sub,padding:40}},
            SE("div",{style:{fontSize:32}}, "🔍"),
            SE("div",{style:{marginTop:8}}, "Không tìm thấy xe nào")
          )
        : filtered.map(r => {
            const days = daysLeft(r.den);
            const exp = expLabel(days);
            return SE("div",{
              key:r.bks,
              onClick:()=>setSelItem(r),
              style:{
                background:C.card,
                border:`1px solid ${days!==null && days<=30 ? "#ef444455" : days!==null && days<=60 ? "#FFCA0055" : C.border}`,
                borderRadius:10,padding:"10px 12px",marginBottom:8,cursor:"pointer",
                display:"flex",justifyContent:"space-between",alignItems:"center"
              }
            },
              SE("div",{style:{flex:1}},
                SE("div",{style:{display:"flex",alignItems:"center",gap:8}},
                  SE("span",{style:{fontWeight:800,fontSize:14,color:"#FFFFFF",letterSpacing:.5}}, r.bks),
                  SE("span",{style:{fontSize:10,background:"#17666A44",color:C.sub,
                    borderRadius:5,padding:"1px 6px"}}, r.xe)
                ),
                SE("div",{style:{fontSize:11,color:C.sub,marginTop:3}}, r.bh),
                SE("div",{style:{fontSize:10,color:"#57D6DC66",marginTop:1}}, r.pv)
              ),
              SE("div",{style:{textAlign:"right",flexShrink:0,marginLeft:8}},
                SE("div",{style:{fontSize:12,fontWeight:700,color:exp.color}}, exp.txt),
                SE("div",{style:{fontSize:10,color:C.sub,marginTop:2}}, fmtDate(r.den))
              )
            );
          })
    ),

    // Detail modal
    selItem && SE("div",{style:selStyle,onClick:()=>setSelItem(null)},
      SE("div",{
        onClick:e=>e.stopPropagation(),
        style:{
          background:"#0B2224",border:`1px solid ${C.border}`,
          borderRadius:"16px 16px 0 0",padding:20,width:"100%",maxWidth:540
        }
      },
        SE("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
          SE("div",{style:{fontWeight:800,fontSize:16,color:"#FFFFFF"}}, "🛡️ Chi tiết BHVC"),
          SE("button",{onClick:()=>setSelItem(null),style:{background:"#17666A55",border:"none",
            color:C.sub,borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:16,fontFamily:"inherit"}},"×")
        ),
        SE("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:14,
          background:"#061C1F",borderRadius:10,padding:"10px 14px"}},
          SE("span",{style:{fontSize:22}}, "🚗"),
          SE("div",null,
            SE("div",{style:{fontWeight:800,fontSize:18,color:C.accent,letterSpacing:.5}}, selItem.bks),
            SE("div",{style:{fontSize:12,color:C.sub}}, selItem.xe)
          )
        ),
        ...[
          ["🏢 Công ty BH", selItem.bh],
          ["📋 Phạm vi", selItem.pv],
          ["📅 Từ ngày", fmtDate(selItem.tu)],
          ["⏳ Đến ngày", fmtDate(selItem.den)],
          ["🔢 Số khung", selItem.vin],
          ["📞 Hotline", selItem.sdt || "—"]
        ].map(([label,val]) =>
          SE("div",{key:label,style:{display:"flex",justifyContent:"space-between",
            padding:"8px 0",borderBottom:`1px solid ${C.border}44`,alignItems:"center"}},
            SE("span",{style:{fontSize:12,color:C.sub}}, label),
            SE("span",{style:{fontSize:12,fontWeight:600,color:"#FFFFFF",textAlign:"right"}}, val)
          )
        ),
        SE("div",{style:{marginTop:10,padding:"10px 14px",background:"#061C1F",borderRadius:10,
          border:`1px solid ${selExp.color}44`,display:"flex",justifyContent:"space-between",alignItems:"center"}},
          SE("span",{style:{color:C.sub,fontSize:12}}, "⏱️ Còn lại"),
          SE("span",{style:{fontWeight:800,fontSize:16,color:selExp.color}}, 
            selExp.txt === "Đã hết hạn" ? "🚫 Đã hết hạn" : selExp.txt + " nữa hết hạn")
        ),
        selItem.sdt && SE("a",{
          href:`tel:${selItem.sdt}`,
          style:{display:"block",marginTop:12,background:C.accent,borderRadius:10,
            padding:"11px 0",textAlign:"center",color:"#071E20",fontWeight:800,
            fontSize:13,textDecoration:"none"}
        },`📞 Gọi ${selItem.bh} — ${selItem.sdt}`)
      )
    )
  );
}

  const [formData, setFormData] = useState(null);
  const [showTX, setShowTX] = useState(false);
  const [showTeam, setShowTeam] = useState(false);
  const [filterLoai, setFilterLoai] = useState("ALL");

// ── AUTOCOMPLETE BIỂN SỐ – VEHICLE LOOKUP ────────────────────────────────────
const FB_VEH_URL = "https://suco-07-default-rtdb.asia-southeast1.firebasedatabase.app/vehicles";
let _vehCache = null;

async function vehFetch() {
  if (_vehCache) return _vehCache;
  try {
    const r = await fetch(FB_VEH_URL + '.json');
    _vehCache = await r.json() || {};
  } catch { _vehCache = {}; }
  return _vehCache;
}

function vehNorm(s) { return (s||'').replace(/[.\-\s]/g,'').toUpperCase(); }

window.vehSearch = async function(val, onSelect) {
  if (!val || val.length < 3) return [];
  const db = await vehFetch();
  const q = vehNorm(val);
  return Object.values(db).filter(v => vehNorm(v.bienSo||'').includes(q)).slice(0,6);
};

window.vehFillForm = function(v, setF) {
  if (!v || !setF) return;
  const toMap = {
    'Tổ 01':'OCP.DOIXE07.01','Tổ 02':'OCP.DOIXE07.02',
    'Tổ 03':'OCP.DOIXE07.03','Tổ 04':'OCP.DOIXE07.04','Tổ 05':'OCP.DOIXE07.05'
  };
  const loaiMap = {
    'MINIOGREEN':'VF5','LIMOGREEN':'VF8','VFE34':'VFE34',
    'VF5':'VF5','HERIOGREEN':'VF5','MINIOGREENPLUS':'VF5'
  };
  setF(prev => ({
    ...prev,
    bienSo:   v.bienSo  || prev.bienSo,
    loaiXe:   loaiMap[v.loaiXe] || v.loaiXe || prev.loaiXe,
    soKhung:  v.soKhung || prev.soKhung,
    to:       toMap[v.to] || prev.to,
    taiXe:    v.tenTX   || prev.taiXe,
    // BH tự điền
    bhDV:         v.bhDV         || prev.bhDV,
    phamViBH:     v.phamViBH     || prev.phamViBH,
    ngayKyBHVC:   v.ngayKyBHVC   || prev.ngayKyBHVC,
    ngayHetBHVC:  v.ngayHetHanBHVC  || prev.ngayHetBHVC,
    ngayKyBHTNDS: v.ngayKyBHTNDS || prev.ngayKyBHTNDS,
    ngayHetBHTNDS:v.ngayHetHanBHTNDS|| prev.ngayHetBHTNDS,
    hanDangKiem:  v.hanDangKiem  || '',
    hanPhuHieu:   v.hanPhuHieu   || '',
    trangThaiXe:  v.trangThaiXe  || '',
  }));
};

// Hook React custom: dùng trong FormGSVH
window.useVehAutocomplete = function(bienSo, setF) {
  const [suggestions, setSuggestions] = React.useState([]);
  const [show, setShow] = React.useState(false);
  const timer = React.useRef(null);

  React.useEffect(() => {
    clearTimeout(timer.current);
    if (!bienSo || bienSo.length < 3) { setSuggestions([]); setShow(false); return; }
    timer.current = setTimeout(async () => {
      const res = await window.vehSearch(bienSo);
      setSuggestions(res);
      setShow(res.length > 0);
    }, 300);
    return () => clearTimeout(timer.current);
  }, [bienSo]);

  const select = (v) => { window.vehFillForm(v, setF); setShow(false); setSuggestions([]); };
  const hide   = ()  => setTimeout(() => setShow(false), 200);
  return { suggestions, show, select, hide };
};

    fill('BIENSO', v.bienSo);
    fill('SOKHUNG', v.soKhung);
    fill('TAIXE', v.tenTX);

    // Lưu BH info để form tự điền khi cần
    window._lastVehicle = v;
    bsInput.dataset.fill = v.bienSo;
    bsInput.dispatchEvent(new Event('blur', {bubbles:true}));
  }

  // Lắng nghe tất cả input events - tìm ô biển số
  document.addEventListener('input', async e => {
    const el = e.target;
    if (el.tagName !== 'INPUT') return;
    const ph = (el.placeholder||'').toUpperCase();
    const val = el.value || '';
    // Chỉ trigger khi đang gõ vào ô có placeholder liên quan đến biển số
    if (!ph.includes('51F') && !ph.includes('BIỂN') && !ph.includes('29E') && !ph.includes('29K')) {
      // Thử detect theo context: input nằm gần label "Biển số"
      const label = el.closest('div')?.previousElementSibling?.textContent || '';
      if (!label.toUpperCase().includes('BIỂN')) return;
    }

    _activeInput = el;
    clearTimeout(_timer);
    removeDD();
    if (val.length < 3) return;

    _timer = setTimeout(async () => {
      const db = await getVehicles();
      const q = norm(val);
      const matches = Object.values(db)
        .filter(v => norm(v.bienSo||'').includes(q))
        .slice(0, 6);
      showDD(matches, el);
    }, 300);
  }, true);

  document.addEventListener('blur', () => {
    setTimeout(removeDD, 200);
  }, true);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') removeDD();
  });

})();

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));


</script>
</body>
</html>
