      }
      #__auth_box input:focus{border-color:#2DCCD3;box-shadow:0 0 0 3px rgba(45,204,211,.15)}

      #__auth_box .name-inp{letter-spacing:1px;font-size:14px;margin-bottom:16px}
      #__auth_btn{
        width:100%;background:linear-gradient(135deg,#2DCCD3,#17666A);color:#fff;
        border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;
        cursor:pointer;font-family:inherit;transition:.2s;
      }
      #__auth_btn:active{transform:scale(.98)}
      #__auth_btn:disabled{opacity:.5;cursor:not-allowed}
      #__auth_msg{margin-top:12px;font-size:12px;min-height:18px;font-weight:700}
      #__auth_msg.err{color:#ef4444}
      #__auth_msg.ok{color:#4ade80}
      #__auth_msg.loading{color:#57D6DC}
      .ocp-badge{
        display:inline-block;background:rgba(45,204,211,.1);
        border:1px solid #2DCCD333;border-radius:20px;
        padding:4px 12px;font-size:10px;color:#57D6DC;margin-top:16px;
      }
    </style>
    <div id="__auth_box">
      <div class="logo">🚖</div>
      <h2>OCP.DOIXE07</h2>
      <div class="sub">Depot Hà Nội 1 · Hệ thống quản lý nội bộ</div>
      <input id="__auth_name" type="text" placeholder="Họ tên của bạn..." class="name-inp" maxlength="30" autocomplete="off"/>
      <input id="__auth_code" type="password" placeholder="Nhập mã truy cập..." maxlength="12" autocomplete="off"/>
      <button id="__auth_btn" onclick="__doAuth()">🔓 Xác nhận</button>
      <div id="__auth_msg"></div>
      <div class="ocp-badge">doixeocp07.cloud · ${PAGE}</div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.documentElement.style.visibility = "visible";

  // Enter key
  overlay.querySelectorAll("input").forEach(inp => {
    inp.addEventListener("keydown", e => { if(e.key === "Enter") window.__doAuth(); });
  });

  setTimeout(() => document.getElementById("__auth_name")?.focus(), 100);

  // ── Xác thực ──────────────────────────────────────────────────────────────
  window.__doAuth = async function() {
    const nameEl = document.getElementById("__auth_name");
    const codeEl = document.getElementById("__auth_code");
    const btn    = document.getElementById("__auth_btn");
    const msg    = document.getElementById("__auth_msg");

    const name = nameEl.value.trim();
    const code = codeEl.value.trim().toUpperCase();

    if (!name) { msg.className="err"; msg.textContent="Vui lòng nhập họ tên!"; nameEl.focus(); return; }
    if (!code) { msg.className="err"; msg.textContent="Vui lòng nhập mã truy cập!"; codeEl.focus(); return; }

    btn.disabled = true;
    btn.textContent = "⏳ Đang kiểm tra...";
    msg.className = "loading"; msg.textContent = "Đang xác thực...";

    try {
      // Hash code bằng SHA-256
      const hash = await sha256(code);

      // Check Firebase /access_codes/{hash}
      const r = await fetch(`${FB}/access_codes/${hash}.json`);
      const data = await r.json();

      if (data && data.active === true) {
        // Ghi log truy cập
        await fetch(`${FB}/access_logs.json`, {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({
            name, role: data.role || "user", page: PAGE,
            time: new Date().toISOString(), ua: navigator.userAgent.slice(0,80)
          })
        });

        msg.className = "ok"; msg.textContent = `✅ Xin chào, ${name}!`;
        sessionStorage.setItem(SK, "ok");
        sessionStorage.setItem(SK_UN, name);
        sessionStorage.setItem("ocp07_role", data.role || "user");

        setTimeout(() => {
          overlay.remove();
          showUserBadge(name);
        }, 700);
      } else {
        msg.className = "err";
        msg.textContent = "❌ Mã truy cập không đúng hoặc đã bị vô hiệu!";
        codeEl.value = ""; codeEl.focus();
        btn.disabled = false; btn.textContent = "🔓 Xác nhận";
      }
    } catch(e) {
      msg.className = "err";
      msg.textContent = "⚠️ Lỗi kết nối. Thử lại!";
      btn.disabled = false; btn.textContent = "🔓 Xác nhận";
    }
  };

  // ── SHA-256 ────────────────────────────────────────────────────────────────
  async function sha256(str) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
  }

  // ── Badge người dùng (sau khi đăng nhập) ──────────────────────────────────
  function showUserBadge(name) {
    if (!name || document.getElementById("__user_badge")) return;
    const badge = document.createElement("div");
    badge.id = "__user_badge";
    badge.style.cssText = "position:fixed;bottom:70px;right:12px;z-index:9000;background:#0B3335;border:1px solid #2DCCD333;border-radius:20px;padding:5px 12px 5px 8px;display:flex;align-items:center;gap:6px;font-family:'Nunito',sans-serif;font-size:11px;color:#57D6DC;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.3)";
    badge.innerHTML = `<span>👤</span><span style="color:#fff;font-weight:700">${name}</span><span style="font-size:9px;opacity:.6" onclick="__logout()">Đăng xuất</span>`;
    badge.querySelector("span:last-child").style.cssText = "font-size:9px;color:#ef4444;cursor:pointer;font-weight:700";
    document.body.appendChild(badge);
  }

  window.__logout = function() {
    if (!confirm("Đăng xuất?")) return;
    sessionStorage.removeItem(SK);
    sessionStorage.removeItem(SK_UN);
    sessionStorage.removeItem("ocp07_role");
    location.reload();
  };

})();

// ══════════════════════════════════════════════════════════
// FIREBASE REALTIME DATABASE

const FB_URL  = "https://suco-07-default-rtdb.asia-southeast1.firebasedatabase.app";
const FB_NODE = "/suvus";

// ── Global fetch helpers (single source of truth) ─────────────────────────────
let _vehCache  = null;
let _bhvcCache = null;

async function fbGet(path) {
  try {
    const r = await fetch(FB_URL + path + '.json');
    return await r.json();
  } catch(e) { return null; }
}
async function fbPut(path, data) {
  const r = await fetch(FB_URL + path + '.json', {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
  return r.ok;
}
async function fbPatch(path, data) {
  const r = await fetch(FB_URL + path + '.json', {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
  return r.ok;
}
async function vehFetch() {
  if (_vehCache) return _vehCache;
  try { _vehCache = await fbGet('/vehicles') || {}; } catch(e) { _vehCache = {}; }
  return _vehCache;
}
async function bhvcFetch() {
  if (_bhvcCache) return _bhvcCache;
  try { _bhvcCache = await fbGet('/bhvc') || {}; } catch(e) { _bhvcCache = {}; }
  return _bhvcCache;
}

async function cloudLoad() {
  try {
    const r = await fetch(FB_URL + FB_NODE + ".json");
    const d = await r.json();
    if (!d) return [];
    return Object.values(d).filter(Boolean).map(sv => {
      // Normalize field names từ tx-form cũ
      if (!sv.buocHienTai && sv.buocHT) sv.buocHienTai = sv.buocHT;
      if (!sv.ghiChu && sv.logs) sv.ghiChu = sv.logs;
      if (!sv.ghiChu && sv.nhatKy) sv.ghiChu = sv.nhatKy;
      return sv;
    });
  } catch(e) {
    console.warn("Firebase load failed:", e);
    return null;
  }
}

async function cloudSave(sv) {
  try {
    await fetch(FB_URL + FB_NODE + "/" + sv.id + ".json", {
      method: "PUT",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(sv)
    });
  } catch(e) { console.warn("Firebase save failed:", e); }
}

async function cloudDelete(id) {
  try {
    await fetch(FB_URL + FB_NODE + "/" + id + ".json", {
      method: "DELETE"
    });
  } catch(e) { console.warn("Firebase delete failed:", e); }
}

async function cloudBatch(list) {
  try {
    const obj = {};
    list.forEach(sv => { obj[sv.id] = sv; });
    await fetch(FB_URL + FB_NODE + ".json", {
      method: "PATCH",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(obj)
    });
  } catch(e) { console.warn("Firebase batch failed:", e); }
}

// ── Bộ hàm ngày chuẩn ────────────────────────────────────────────────────────
// parseDate: chuẩn hóa BẤT KỲ format nào → Date object
const parseDate = s => {
  if (!s) return null;
  const str = String(s).trim();
  // YYYY-MM-DD (ISO)
  if (/^\d{4}-\d{2}-\d{2}/.test(str)) {
    const d = new Date(str.slice(0,10));
    return isNaN(d.getTime()) ? null : d;
  }
  // DD/MM/YYYY (vi-VN)
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(str)) {
    const [d,m,y] = str.split('/');
    const dt = new Date(`${y}-${m}-${d}`);
    return isNaN(dt.getTime()) ? null : dt;
  }
  // Text BHVC: "00h ngày DD/MM/YYYY"
  const txtMatch = str.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (txtMatch) {
    const [, d, m, y] = txtMatch;
    const dt = new Date(`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`);
    return isNaN(dt.getTime()) ? null : dt;
  }
  // Excel serial number (số ngày từ 1/1/1900)
  if (/^\d{5}$/.test(str)) {
    const dt = new Date((parseInt(str) - 25569) * 86400000);
    return isNaN(dt.getTime()) ? null : dt;
  }
  // Fallback
  const dt = new Date(str);
  return isNaN(dt.getTime()) ? null : dt;
};

// toISO: bất kỳ format → YYYY-MM-DD (lưu Firebase)

const BH_HOTLINE = {
  "MIC":        "1900558891",
  "PJICO":      "1900545455",
  "DBV":        "1900969690",   // (tiền thân Bảo hiểm Hàng không VNI)

  "LPBANK":     "19001898",
  "PVI":        "1900545458",
  "BAO VIET":   "18001118",
  "BẢO VIỆT":   "18001118",
  "BAO MINH":   "1800588812",
  "BẢO MINH":   "1800588812",
  "BSH":        "19009609",     // Bảo hiểm Sài Gòn - Hà Nội
};

function getHotline(tenBH, sdtCo=''){
  if (sdtCo) return sdtCo; // Ưu tiên SĐT có sẵn trong Excel
  if (!tenBH) return '';
  const t = tenBH.toUpperCase();
  for (const key in BH_HOTLINE) {
    if (t.includes(key)) return BH_HOTLINE[key];
  }
  return '';
}

function BHTVSearch() {
  const [q, setQ]           = useState("");
  const [all, setAll]        = useState([]);     // toàn bộ data /bhvc + merge
  const [results, setResults]= useState([]);
  const [loading, setLoading]= useState(false);
  const [expanded, setExpanded] = useState(null);
  const [sortBy, setSortBy]  = useState("hhBHVC");
  const [filterHH, setFilterHH] = useState("ALL");
  const [copied, setCopied]  = useState(false);
  const [exporting, setExporting] = useState(false);
  const [err, setErr]        = useState(null);

  const nm = s => (s||'').replace(/[.\-\s]/g,'').toUpperCase();

  const bhSt = den => {
    const d = daysDiff(den);
    if (d === null) return {label:"Chưa có",       color:"#475569", dot:"⚫"};
    if (d < 0)     return {label:`HẾT HẠN ${Math.abs(d)} ngày`, color:C.red,    dot:"🔴"};
    if (d <= 30)   return {label:`Còn ${d} ngày ⚠️`, color:"#f59e0b", dot:"🟡"};
                   return {label:`Còn ${d} ngày`,   color:"#22c55e", dot:"🟢"};
  };

  // ── Load data khi mount ────────────────────────────────────────────────────
  React.useEffect(() => {
    loadAll();
  }, []);

  const loadAll = async () => {
    setLoading(true); setErr(null);
    try {
      const [bhvcDb, vehDb] = await Promise.all([bhvcFetch(), vehFetch()]);
      if (!bhvcDb || Object.keys(bhvcDb).length === 0) {
        setErr("Không có dữ liệu BHVC trên Firebase. Vui lòng upload file BHVC.");
        setLoading(false); return;
      }
      const vehArr = Object.values(vehDb||{});
      const data = Object.entries(bhvcDb).filter(([,b])=>Boolean(b)).map(([key, b]) => {
        const rawBKS = b.bks||b.BKS||b['Biển số']||b.bienSo||'';
        const bsn    = nm(rawBKS)||nm(key);
        const veh    = vehArr.find(v => nm(v.bienSo||'')=== bsn) || {};
        return {
          bienSo:          rawBKS||veh.bienSo||key,
          loaiXe:          b.xe||b['Dòng xe']||veh.loaiXe||'',
          bhDV:            b.bh||b['Bảo Hiểm']||veh.bhDV||'',
          phamViBH:        b.pv||b['Phạm vi']||veh.phamViBH||'',
          ngayKyBHVC:      b.tu||b['Từ ngày']||veh.ngayKyBHVC||'',
          ngayHetHanBHVC:  b.den||b['Đến ngày']||veh.ngayHetHanBHVC||'',
          sdtBH:           getHotline(b.bh||b['Bảo Hiểm']||veh.bhDV||'', b.sdt||b['SĐT tổng đài']||''),
          soKhung:         b.vin||b['Số Khung']||veh.soKhung||'',
          to:              veh.to||'',
          tenTX:           veh.tenTX||veh.taiXe||'',
          ngayHetHanBHTNDS:veh.ngayHetHanBHTNDS||'',
          hanDangKiem:     veh.hanDangKiem||'',
        };
      });
      setAll(data);
      applyFilter(data, filterHH, q);
    } catch(e) {
      setErr("Lỗi tải dữ liệu: " + e.message);
    }
    setLoading(false);
  };

  // ── Filter / Search ─────────────────────────────────────────────────────────
  const applyFilter = (data, filt, qv) => {
    const pool = data || all;
    let res = !qv.trim() ? pool : pool.filter(v => {
      const qn = nm(qv);
      return nm(v.bienSo).includes(qn) || nm(v.tenTX||'').includes(qn) ||
             nm(v.to||'').includes(qn)  || nm(v.bhDV||'').includes(qn);
    });
    if (filt === "het") res = res.filter(v => { const d=daysDiff(v.ngayHetHanBHVC); return d!==null&&d<0; });
    if (filt === "sap") res = res.filter(v => { const d=daysDiff(v.ngayHetHanBHVC); return d!==null&&d>=0&&d<=30; });
    if (filt === "con") res = res.filter(v => { const d=daysDiff(v.ngayHetHanBHVC); return d!==null&&d>30; });
    res = [...res].sort((a,b) => {
      if (sortBy==="bienSo") return nm(a.bienSo).localeCompare(nm(b.bienSo));
      if (sortBy==="to")     return nm(a.to||'').localeCompare(nm(b.to||''));
      const da=daysDiff(a.ngayHetHanBHVC), db2=daysDiff(b.ngayHetHanBHVC);
      return (da===null?99999:da)-(db2===null?99999:db2);
    });
    setResults(res);
  };

  const doSearch = () => { setExpanded(null); applyFilter(all, filterHH, q); };

  const setFilt = filt => {
    setFilterHH(filt); setExpanded(null);
    applyFilter(all, filt, q);
  };
  const setSort = s => {
    setSortBy(s);
    const res = [...results].sort((a,b) => {
      if (s==="bienSo") return nm(a.bienSo).localeCompare(nm(b.bienSo));
      if (s==="to")     return nm(a.to||'').localeCompare(nm(b.to||''));
      const da=daysDiff(a.ngayHetHanBHVC), db2=daysDiff(b.ngayHetHanBHVC);
      return (da===null?99999:da)-(db2===null?99999:db2);
    });
    setResults(res);
  };

  // ── Stats ──────────────────────────────────────────────────────────────────
  const het = all.filter(v=>{const d=daysDiff(v.ngayHetHanBHVC);return d!==null&&d<0;});
  const sap = all.filter(v=>{const d=daysDiff(v.ngayHetHanBHVC);return d!==null&&d>=0&&d<=30;});
  const okC = all.filter(v=>{const d=daysDiff(v.ngayHetHanBHVC);return d!==null&&d>30;});

  // ── Copy report ───────────────────────────────────────────────────────────
  const copyReport = () => {
    const L=[`🛡️ BÁO CÁO BHVC – OCP.DOIXE07`,`📅 Ngày: ${fmtDate(today())}`,`━━━━━━━━━━━━━━━━━━━━━━`,
      `📊 TỔNG HỢP (${results.length} xe trong kết quả)`,
      `🔴 Đã hết hạn: ${results.filter(v=>{const d=daysDiff(v.ngayHetHanBHVC);return d!==null&&d<0;}).length} xe`,
      `🟡 Sắp hết (≤30 ngày): ${results.filter(v=>{const d=daysDiff(v.ngayHetHanBHVC);return d!==null&&d>=0&&d<=30;}).length} xe`,
      `🟢 Còn hạn: ${results.filter(v=>{const d=daysDiff(v.ngayHetHanBHVC);return d!==null&&d>30;}).length} xe`,
    ];
    const hetR = results.filter(v=>{const d=daysDiff(v.ngayHetHanBHVC);return d!==null&&d<0;});
    const sapR = results.filter(v=>{const d=daysDiff(v.ngayHetHanBHVC);return d!==null&&d>=0&&d<=30;});
    if(hetR.length>0){L.push('');L.push('🔴 ĐÃ HẾT HẠN:');hetR.forEach(v=>L.push(`  • ${v.bienSo} · ${v.tenTX||'—'} · ${v.to||'—'} · HH: ${fmtDate(v.ngayHetHanBHVC)}`));}
    if(sapR.length>0){L.push('');L.push('🟡 SẮP HẾT (≤30 NGÀY):');sapR.forEach(v=>{const d=daysDiff(v.ngayHetHanBHVC);L.push(`  • ${v.bienSo} · ${v.tenTX||'—'} · Còn ${d} ngày · HH: ${fmtDate(v.ngayHetHanBHVC)}`);});}
    L.push('');L.push('━━━━━━━━━━━━━━━━━━━━━━');L.push('📍 OCP.DOIXE07 · Depot Hà Nội 1');
    navigator.clipboard.writeText(L.join('\n')).catch(()=>{});
    setCopied(true); setTimeout(()=>setCopied(false),2500);
  };

  // ── Export Excel ──────────────────────────────────────────────────────────
  const exportExcel = async () => {
    setExporting(true);
    try {
      if (!window.XLSX) {
        await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
      }
      const XLSX = window.XLSX;
      const statusLabel = d => { const diff=daysDiff(d); if(diff===null)return'Chưa có'; if(diff<0)return`Hết hạn ${Math.abs(diff)} ngày`; if(diff<=30)return`Còn ${diff} ngày ⚠️`; return`Còn ${diff} ngày`; };
      const rows = results.map(v=>({'Biển số':v.bienSo,'Loại xe':v.loaiXe,'Tổ':v.to,'Tài xế':v.tenTX,'Công ty BH':v.bhDV,'Phạm vi BH':v.phamViBH,'Ngày ký BHVC':fmtDate(v.ngayKyBHVC),'HH BHVC':fmtDate(v.ngayHetHanBHVC),'Tình trạng':statusLabel(v.ngayHetHanBHVC),'SĐT BH':v.sdtBH,'HH TNDS':fmtDate(v.ngayHetHanBHTNDS),'Hạn ĐK':fmtDate(v.hanDangKiem),'Số khung':v.soKhung}));
      const ws = XLSX.utils.json_to_sheet(rows);
      ws['!cols']=[{wch:12},{wch:9},{wch:16},{wch:22},{wch:18},{wch:14},{wch:13},{wch:13},{wch:20},{wch:13},{wch:13},{wch:13},{wch:20}];
      const wb = XLSX.utils.book_new();

function XeTXSearch() {
  const [q, setQ] = React.useState("");
  const [mode, setMode] = React.useState("xe"); // xe | tx
  const [loading, setLoading] = React.useState(false);
  const [result, setResult] = React.useState(null); // {type, data}
  const [hits, setHits] = React.useState([]);

  const normBKS = s => (s||'').replace(/[.\-\s]/g,'').toUpperCase();

  const daysSinceStr = s => daysSince(s) || null;

  const toLabel = to => {
    const m = TEAM.find(t=>t.to===to);
    return m ? `${to} (${m.ten})` : to||"—";
  };

  // Auto-detect mode: có số+chữ liền = biển số
  const detectMode = v => /^[0-9]{2}[A-Z]/.test(normBKS(v)) ? "xe" : "tx";

  const doSearch = async () => {
    if (!q.trim()) return;
    setLoading(true); setResult(null); setHits([]);
    const qn = normBKS(q);
    const [vehDb, drvDb] = await Promise.all([vehFetch(), fbGet('/drivers')]);
    const vArr = Object.values(vehDb||{}).filter(Boolean);
    const dArr = Object.values(drvDb||{}).filter(Boolean);

    if (mode === "xe") {
      // Tìm theo biển số
      const found = vArr.filter(v => normBKS(v.bienSo||'').includes(qn));
      if (found.length === 1) {
        setResult({type:"xe", data: found[0]});
      } else if (found.length > 1) {
        setHits(found.slice(0,8).map(v=>({label:v.bienSo, sub:`${v.loaiXe||''} · ${v.to||''} · ${v.tenTX||'Chưa có TX'}`, data:v, type:"xe"})));
      } else setResult({type:"xe", data:null});
    } else {
      // Tìm theo tên TX hoặc mã NV
      const q2 = q.trim().toLowerCase();
      const found = dArr.filter(d =>
        (d.ten||'').toLowerCase().includes(q2) ||
        (d.maNV||'').includes(q.trim()) ||
        (d.sdt||'').includes(q.trim())
      );
      if (found.length === 1) {
        // Lấy lịch sử xe TX đã lái từ /vehicles
        const xeHistory = vArr.filter(v => {
          const ls = v.lichSuTX||[];
          return ls.some(h => (h.maNV||'')===(found[0].maNV||'') || (h.tenTX||'').toLowerCase()===(found[0].ten||'').toLowerCase());
        });
        setResult({type:"tx", data:found[0], xeHistory});
      } else if (found.length > 1) {
        setHits(found.slice(0,8).map(d=>({label:d.ten, sub:`Mã NV: ${d.maNV||'—'} · ${d.to||'—'} · ${d.bienSo||'Chưa gán xe'}`, data:d, type:"tx"})));
      } else setResult({type:"tx", data:null});
    }
    setLoading(false);
  };

  const IS = {background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,padding:"9px 11px",fontSize:13,outline:"none",fontFamily:"inherit",width:"100%"};

// ── ADMIN PANEL ──────────────────────────────────────────────────────────────
function AdminPanel() {
  const [tab, setTab]     = useState("bhvc");
  const [log, setLog]     = useState({});      // {bhvc:[], xe:[], tx:[], ma:[]}
  const [preview, setPreview] = useState({});  // {bhvc:{rows,stats}, xe:..., tx:...}
  const [loading, setLoading] = useState({});
  const [codes, setCodes] = useState([]);
  const [newCode, setNewCode] = useState({name:"",code:"",role:"gsvh",note:""});

  const addLog = (key, msg, type="info") => {
    setLog(prev => ({...prev, [key]: [...(prev[key]||[]), {msg, type, t:new Date().toLocaleTimeString("vi-VN")}]}));
  };

  // ── SHA-256 ─────────────────────────────────────────────────────────────────
  const sha256 = async str => {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  };

  // ── Load SheetJS ─────────────────────────────────────────────────────────────
  const loadXLSX = () => new Promise((res,rej) => {
    if (window.XLSX) return res(window.XLSX);
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    s.onload = () => res(window.XLSX); s.onerror = rej;
    document.head.appendChild(s);
  });

  // ── Chuẩn hóa ─────────────────────────────────────────────────────────────
  const normBKS = s => (s||"").toString().replace(/[.\-\s]/g,"").toUpperCase().trim();
  const cleanStr = v => { if (v===null||v===undefined) return ""; const s=String(v).trim(); return ["nan","NaT","None","undefined","null"].includes(s)?"":s; };
  const toISO_d = v => {
    if (!v) return "";
    const d = parseDate(v); // dùng chung global parseDate (đã hỗ trợ text "00h ngày DD/MM/YYYY")
    return d ? d.toISOString().slice(0,10) : "";
  };

  // ── Parse BHVC Excel ──────────────────────────────────────────────────────
  const parseBHVC = async file => {
    const XLSX = await loadXLSX();
    const buf  = await file.arrayBuffer();
    // Hỗ trợ .xlsx, .xlsb, .xls, .csv
    const isXLSB = file.name.toLowerCase().endsWith('.xlsb');
    const wb = XLSX.read(buf, {type:"array", cellDates:false, raw:true});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const aoa = XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:""});

    // Tìm header row (row có "Biển" hoặc "BKS" hoặc "Số khung")
    let hdrIdx = 0;
    for (let i=0;i<Math.min(20,aoa.length);i++) {
      const r = aoa[i].map(v=>String(v||"").toLowerCase());
      if (r.some(v=>v.includes("biển")||v.includes("bks")||v==="số khung")) { hdrIdx=i; break; }
    }
    const hdr = aoa[hdrIdx].map(v=>String(v||"").trim());

    // Tìm index các cột quan trọng
    const ci = name => hdr.findIndex(h=>h.toLowerCase().includes(name.toLowerCase()));
    const iBKS  = ci("biển")||ci("bks");
    const iVIN  = ci("số khung");
    const iXE   = ci("dòng xe")||ci("loại xe");
    const iBH   = ci("tên đơn vị")||ci("bảo hiểm")||ci("công ty bh")||ci("bh");
    const iPV   = ci("phạm vi");
    const iTU   = ci("từ ngày")||ci("ngày bắt đầu");
    const iDEN  = ci("đến ngày")||ci("ngày kết thúc")||ci("hh bhvc");
    const iSDT  = ci("sđt")||ci("hotline")||ci("tổng đài");

    const xlDate = v => {
      if (!v) return "";
      const n = parseFloat(v);
      if (isNaN(n)||n<1000||n>200000) {
        // Thử parse string thẳng
        return toISO_d(String(v));
      }
      const d = new Date((n-25569)*86400000);
      return d.toISOString().slice(0,10);
    };

    const loaiMap = {"VF 5":"VF5","VFe34":"VFE34","VF e34":"VFE34","Limo green":"LIMOGREEN","Limo Green":"LIMOGREEN","Minio green":"MINIOGREEN","Minio Green":"MINIOGREEN"};
    const data = {}; const errs = [];

    for (let i=hdrIdx+1; i<aoa.length; i++) {
      const row = aoa[i];
      const g = idx => idx>=0&&idx<row.length ? String(row[idx]||"").trim() : "";
      const bks = g(iBKS>=0?iBKS:5);
      const key = normBKS(bks);
      if (!key||key.length<5) { if(bks) errs.push(`Dòng ${i+1}: BKS "${bks}" không hợp lệ`); continue; }
      // Lọc chỉ biển Hà Nội nếu file toàn quốc

      const loaiRaw = g(iXE>=0?iXE:3);

      data[key] = {
        bks, vin: g(iVIN>=0?iVIN:2),
        xe, bh: g(iBH>=0?iBH:9),
        pv: g(iPV>=0?iPV:10)||"Xe gồm pin",
        tu, den,
        sdt: g(iSDT>=0?iSDT:0).replace(/\.0$/,"")
      };
    }

    const todayISO = new Date().toISOString().slice(0,10);

    const het   = vals.filter(v=>v.den&&v.den<todayISO).length;
    const sap   = vals.filter(v=>v.den&&v.den>=todayISO&&v.den<=in30).length;
    return {data, stats:{total:vals.length, het, sap, ok:vals.length-het-sap, errs:errs.length}, errs};
  };

    const data = {}; const errs = [];

      data[key] = {

        loaiXe: cleanStr(r["Dòng xe"]||r["Loại xe"]||""),
        to: cleanStr(r["Tổ"]||""), moHinh: cleanStr(r["Mô hình vận doanh"]||"GreenCar"),

// ── AUTOCOMPLETE BIỂN SỐ – VEHICLE LOOKUP ────────────────────────────────────


function vehNorm(s) { return (s||'').replace(/[.\-\s]/g,'').toUpperCase(); }

window.vehSearch = async function(val, onSelect) {
  if (!val || val.length < 3) return [];
  const db = await vehFetch();
  const q = vehNorm(val);
  return Object.values(db).filter(v => vehNorm(v.bienSo||'').includes(q)).slice(0,6);
};

window.vehFillForm = function(v, setF) {
  if (!v || !setF) return;
  const toMap = {
    'Tổ 01':'OCP.DOIXE07.01','Tổ 02':'OCP.DOIXE07.02',
    'Tổ 03':'OCP.DOIXE07.03','Tổ 04':'OCP.DOIXE07.04','Tổ 05':'OCP.DOIXE07.05'
  };
  const loaiMap = {
    'MINIOGREEN':'VF5','LIMOGREEN':'VF8','VFE34':'VFE34',
    'VF5':'VF5','HERIOGREEN':'VF5','MINIOGREENPLUS':'VF5'
  };
  setF(prev => ({
    ...prev,
    bienSo:   v.bienSo  || prev.bienSo,
    loaiXe:   loaiMap[v.loaiXe] || v.loaiXe || prev.loaiXe,
    soKhung:  v.soKhung || prev.soKhung,
    to:       toMap[v.to] || prev.to,
    taiXe:    v.tenTX   || prev.taiXe,
    // BH tự điền
    bhDV:         v.bhDV         || prev.bhDV,
    phamViBH:     v.phamViBH     || prev.phamViBH,
    ngayKyBHVC:   v.ngayKyBHVC   || prev.ngayKyBHVC,
    ngayHetBHVC:  v.ngayHetHanBHVC  || prev.ngayHetBHVC,
    ngayKyBHTNDS: v.ngayKyBHTNDS || prev.ngayKyBHTNDS,
    ngayHetBHTNDS:v.ngayHetHanBHTNDS|| prev.ngayHetBHTNDS,
    hanDangKiem:  v.hanDangKiem  || '',
    hanPhuHieu:   v.hanPhuHieu   || '',
    trangThaiXe:  v.trangThaiXe  || '',
  }));
};

// Hook React custom: dùng trong FormGSVH
window.useVehAutocomplete = function(bienSo, setF) {
  const [suggestions, setSuggestions] = React.useState([]);
  const [show, setShow] = React.useState(false);
  const timer = React.useRef(null);

  React.useEffect(() => {
    clearTimeout(timer.current);
    if (!bienSo || bienSo.length < 3) { setSuggestions([]); setShow(false); return; }
    timer.current = setTimeout(async () => {
      const res = await window.vehSearch(bienSo);
      setSuggestions(res);
      setShow(res.length > 0);
    }, 300);
    return () => clearTimeout(timer.current);
  }, [bienSo]);

  const select = (v) => { window.vehFillForm(v, setF); setShow(false); setSuggestions([]); };
  const hide   = ()  => setTimeout(() => setShow(false), 200);
  return { suggestions, show, select, hide };
};


// ── VEHICLE AUTOCOMPLETE (Global JS, không dụng vào React) ──────────────────
(function() {
  let _cache = null, _timer = null, _activeInput = null;

  // CSS cho dropdown
  const style = document.createElement('style');
  style.textContent = `
    #_veh_dd {
      position:fixed; z-index:9999; background:#fff;
      border:2px solid #2DCCD3; border-radius:12px;
      box-shadow:0 6px 24px rgba(45,204,211,.25);
      max-height:260px; overflow-y:auto; min-width:280px;
      font-family:Nunito,sans-serif;
    }
    #_veh_dd .vdd-item {
      padding:10px 14px; cursor:pointer;
      border-bottom:1px solid #D5F5F6;
      transition:background .1s;
    }
    #_veh_dd .vdd-item:hover { background:#D5F5F6; }
    #_veh_dd .vdd-item:last-child { border-bottom:none; }
    #_veh_dd .vdd-bs { font-size:14px; font-weight:800; color:#0B3335; }
    #_veh_dd .vdd-info { font-size:11px; color:#17666A; margin-top:2px; }
    #_veh_dd .vdd-bh { font-size:10px; color:#FFCA00; }
  `;
  document.head.appendChild(style);

  async function getVehicles() {
    return await vehFetch();
  }

  function norm(s) { return (s||'').replace(/[.\-\s]/g,'').toUpperCase(); }

  function showDD(items, input) {
    removeDD();
    if (!items.length) return;
    const dd = document.createElement('div');
    dd.id = '_veh_dd';

    const rect = input.getBoundingClientRect();
    dd.style.cssText = `top:${rect.bottom+4}px;left:${rect.left}px;width:${Math.max(rect.width,280)}px`;

    items.forEach(v => {
      const item = document.createElement('div');
      item.className = 'vdd-item';
      const loaiMap = {MINIOGREEN:'VF5',LIMOGREEN:'VF8',VFE34:'VFE34',VF5:'VF5',HERIOGREEN:'VF5'};
      const loai = loaiMap[v.loaiXe] || v.loaiXe || '';
      item.innerHTML = `
        <div class="vdd-bs">${v.bienSo}</div>
        <div class="vdd-info">${loai} · ${v.to}${v.tenTX?' · '+v.tenTX:''}</div>
        ${v.bhDV?`<div class="vdd-bh">BH: ${v.bhDV} · HH BHVC: ${v.ngayHetHanBHVC||'—'}</div>`:''}
      `;
      item.addEventListener('mousedown', e => {
        e.preventDefault();
        fillVehicle(v, input);
        removeDD();
      });
      dd.appendChild(item);
    });
    document.body.appendChild(dd);
  }

  function removeDD() {
    document.getElementById('_veh_dd')?.remove();
  }

  const toFull = {
    'Tổ 01':'OCP.DOIXE07.01','Tổ 02':'OCP.DOIXE07.02','Tổ 03':'OCP.DOIXE07.03',
    'Tổ 04':'OCP.DOIXE07.04','Tổ 05':'OCP.DOIXE07.05'
  };

  function fillVehicle(v, bsInput) {
    // Điền biển số - trigger React qua nativeInputValueSetter
    const nativeSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value').set;
    const triggerChange = el => {
      nativeSetter.call(el, el.dataset.fill || '');
      el.dispatchEvent(new Event('input', {bubbles:true}));
      el.dispatchEvent(new Event('change', {bubbles:true}));
      setTimeout(() => el.dispatchEvent(new Event('blur', {bubbles:true})), 50);
    };

    // Tìm các fields trong form đang mở
    const form = document.querySelector('[style*="position:fixed"][style*="z-index:100"]') || document.body;
    const allInputs = form.querySelectorAll('input, select, textarea');

    const fill = (placeholder, value) => {
      allInputs.forEach(el => {
        const label = el.closest('div')?.previousElementSibling?.textContent?.toUpperCase() || '';
        const ph = (el.placeholder||'').toUpperCase();
        if (!value) return;
        // Match theo placeholder hoặc label
        if (placeholder === 'BIENSO' && (ph.includes('51F') || ph.includes('BIỂN'))) {
          el.dataset.fill = value; triggerChange(el);
        }
        if (placeholder === 'SOKHUNG' && (ph.includes('KHUNG') || label.includes('KHUNG'))) {
          el.dataset.fill = value; triggerChange(el);
        }
        if (placeholder === 'TAIXE' && (ph.includes('NGUYỄN') || label.includes('TÀI XẾ'))) {
          el.dataset.fill = value; triggerChange(el);
        }
      });
      // Fill select Tổ
      allInputs.forEach(el => {
        if (el.tagName === 'SELECT' && el.innerHTML.includes('OCP.DOIXE07')) {
          const fullTo = toFull[v.to] || v.to;
          if (fullTo) {
            el.dataset.fill = fullTo;
            nativeSetter.call(el, fullTo);
            el.dispatchEvent(new Event('change', {bubbles:true}));
          }
        }
      });
    };

    fill('BIENSO', v.bienSo);
    fill('SOKHUNG', v.soKhung);
    fill('TAIXE', v.tenTX);

    // Lưu BH info để form tự điền khi cần
    window._lastVehicle = v;
    bsInput.dataset.fill = v.bienSo;
    bsInput.dispatchEvent(new Event('blur', {bubbles:true}));
  }

  // Lắng nghe tất cả input events - tìm ô biển số
  document.addEventListener('input', async e => {
    const el = e.target;
    if (el.tagName !== 'INPUT') return;
    const ph = (el.placeholder||'').toUpperCase();
    const val = el.value || '';
    // Chỉ trigger khi đang gõ vào ô có placeholder liên quan đến biển số
    if (!ph.includes('51F') && !ph.includes('BIỂN') && !ph.includes('29E') && !ph.includes('29K')) {
      // Thử detect theo context: input nằm gần label "Biển số"
      const label = el.closest('div')?.previousElementSibling?.textContent || '';
      if (!label.toUpperCase().includes('BIỂN')) return;
    }

    _activeInput = el;
    clearTimeout(_timer);
    removeDD();
    if (val.length < 3) return;

    _timer = setTimeout(async () => {
      const db = await getVehicles();
      const q = norm(val);
      const matches = Object.values(db)
        .filter(v => norm(v.bienSo||'').includes(q))
        .slice(0, 6);
      showDD(matches, el);
    }, 300);
  }, true);

  document.addEventListener('blur', () => {
    setTimeout(removeDD, 200);
  }, true);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') removeDD();
  });

})();

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));


</script>
